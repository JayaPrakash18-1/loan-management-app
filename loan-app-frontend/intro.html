<!DOCTYPE html>
<html>
<head>
  <title>JP Finance</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #EAF1E4 0%, #0D9800 100%);
    }

    .intro-container {
      text-align: center;
      color: #0B5F00;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
    }

    .title {
      font-size: 36px;
      font-weight: bold;
    }
  </style>

</head>

<body>

<div class="intro-container">

  <img class="logo" src="https://placehold.co/120x120">

  <div class="title">
    JP Finance
  </div>

</div>

<script>
  // Redirect after 2 seconds
  setTimeout(() => {

    const token = localStorage.getItem("token");

    if (token) {
      window.location.href = "loans.html";
    } else {
      window.location.href = "login.html";
    }

  }, 2000);
</script>

</body>
</html>
